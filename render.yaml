services:
  - type: web
    name: svga-book-bank-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3004
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MSG91_API_KEY
        sync: false
      - key: MSG91_TEMPLATE_ID
        sync: false
      - key: MSG91_COUNTRY_CODE
        value: 91
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        value: https://your-frontend.vercel.app
